<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Meta - Character Encoding (must be first) -->
    <meta charset="UTF-8" />

    <!-- Meta - Viewport for responsive design -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Meta - Theme color (mobile browser UI color) -->
    <meta name="theme-color" content="#667eea" />

    <!-- Meta - Description (SEO) -->
    <meta name="description" content="AI UI Generator - Generate modern, responsive UI designs instantly using artificial intelligence. Transform your ideas into beautiful UIs with one click." />

    <!-- Meta - Keywords (SEO) -->
    <meta name="keywords" content="AI, UI Generator, Web Design, React, Modern UI, Web App, UI Design Tool" />

    <!-- Meta - Author -->
    <meta name="author" content="Tushar" />

    <!-- Meta - Copyright -->
    <meta name="copyright" content="© 2024 AI UI Generator. All rights reserved." />

    <!-- Meta - Robots (SEO) -->
    <meta name="robots" content="index, follow" />

    <!-- Meta - Language -->
    <meta http-equiv="content-language" content="en-us" />

    <!-- PWA / Mobile web app support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AI UI Generator" />

    <!-- Open Graph (Social Media sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="AI UI Generator - Create UIs with AI" />
    <meta property="og:description" content="Generate modern, responsive UI designs instantly using artificial intelligence." />
    <meta property="og:url" content="https://ai-ui-generator.com" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="AI UI Generator" />

    <!-- Twitter Card (Social Media sharing) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI UI Generator" />
    <meta name="twitter:description" content="Generate beautiful UI designs with AI" />
    <meta name="twitter:image" content="/twitter-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />

    <!-- Web App Manifest (PWA) -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect to external resources (performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet" />

    <!-- External Stylesheets -->
    <link rel="stylesheet" href="/styles.css" />

    <!-- Canonical URL (SEO) -->
    <link rel="canonical" href="https://ai-ui-generator.com" />

    <!-- Security Headers -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />

    <!-- Page Title -->
    <title>AI UI Generator - Create Modern UIs with AI</title>
  </head>

  <body>
    <!-- Main React App Mount Point -->
    <div id="root"></div>

    <!-- Loading Fallback (shown before React loads) -->
    <noscript>
      <div style="
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      ">
        <div style="text-align: center;">
          <h1>⚠️ JavaScript Required</h1>
          <p>Please enable JavaScript to use AI UI Generator</p>
        </div>
      </div>
    </noscript>

    <!-- React Entry Point -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- Performance Monitoring (optional) -->
    <script>
      // Measure page load performance
      if (window.performance && window.performance.timing) {
        window.addEventListener('load', function() {
          const perfData = window.performance.timing;
          const pageLoadTime = perfData.loadEventEnd - perfData.navigationStart;
          console.log('Page load time: ' + pageLoadTime + 'ms');
        });
      }

      // Send error logs to server (optional)
      window.addEventListener('error', function(e) {
        console.error('Frontend error:', e.message);
        // You can send this to your logging service
      });
    </script>
  </body>
</html>
